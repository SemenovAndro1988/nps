<div class="wrapper wrapper-content animated fadeInRight">
    <div class="row">
        <div class="col-lg-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5>Bots</h5>
                </div>
                <div class="content">
                {{if eq true .isAdmin}}
                    <div class="table-responsive">
                        <div id="toolbar">
                            <a class="btn btn-primary dim" onclick="addBot()">
                                <i class="fa fa-fw fa-lg fa-plus"></i> Add bot
                            </a>
                        </div>
                        <table id="taskList_table" class="table-striped table-hover" data-mobile-responsive="true"></table>
                    </div>
                {{end}}
                    <div class="ibox-content">
                        <table id="table"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function buildSocks5Url(row) {
        var port = '{{.socks5Port}}' || '';
        if (!port || port === '0') {
            return '<span class="text-muted">socks5_port not set in nps.conf</span>';
        }
        var u = (row.Cnf && row.Cnf.U) ? row.Cnf.U : '';
        var p = (row.Cnf && row.Cnf.P) ? row.Cnf.P : '';
        if (!u || !p) {
            return '<span class="text-muted">no credentials</span>';
        }
        return 'socks5://' + u + ':' + p + '@' + window.location.hostname + ':' + port;
    }

    function copyText(text) {
        var $tmp = $('<textarea>');
        $('body').append($tmp);
        $tmp.val(text).select();
        try {
            document.execCommand('copy');
        } catch (e) {}
        $tmp.remove();
    }

    function addBot() {
        var remark = prompt('Remark for the new bot (optional)', '');
        if (remark === null) return;
        $.ajax({
            type: 'POST',
            url: '{{.web_base_url}}/client/add',
            data: { remark: remark },
            success: function (res) {
                alert(res.msg);
                if (res.status) {
                    $('#table').bootstrapTable('refresh');
                }
            }
        });
    }

    function regenerate(id) {
        if (!confirm('Generate a new SOCKS5 username and password for this bot?')) return;
        $.ajax({
            type: 'POST',
            url: '{{.web_base_url}}/client/regenerate',
            data: { id: id },
            success: function (res) {
                alert(res.msg);
                if (res.status) {
                    $('#table').bootstrapTable('refresh');
                }
            }
        });
    }

    function editRemark(id, current) {
        var remark = prompt('Edit remark', current || '');
        if (remark === null) return;
        $.ajax({
            type: 'POST',
            url: '{{.web_base_url}}/client/edit',
            data: { id: id, remark: remark },
            success: function (res) {
                alert(res.msg);
                if (res.status) {
                    $('#table').bootstrapTable('refresh');
                }
            }
        });
    }

    /* bootstrap table */
    $('#table').bootstrapTable({
        toolbar: '#toolbar',
        method: 'post',
        url: '{{.web_base_url}}/client/list',
        contentType: 'application/x-www-form-urlencoded',
        striped: true,
        search: true,
        showHeader: true,
        showColumns: true,
        showRefresh: true,
        pagination: true,
        sidePagination: 'server',
        pageNumber: 1,
        pageList: [10, 20, 50, 100],
        smartDisplay: true,
        columns: [
            {
                field: 'Id',
                title: 'ID',
                halign: 'center',
                visible: true
            },
            {
                field: 'Remark',
                title: 'Remark',
                halign: 'center',
                visible: true,
                formatter: function (value) { return value || '<span class="text-muted">-</span>'; }
            },
            {
                field: 'Addr',
                title: 'Address',
                halign: 'center',
                visible: true,
                formatter: function (value) { return value || '<span class="text-muted">-</span>'; }
            },
            {
                field: 'IsConnect',
                title: 'Status',
                halign: 'center',
                align: 'center',
                visible: true,
                formatter: function (value) {
                    if (value) {
                        return '<span class="badge badge-primary">Online</span>';
                    }
                    return '<span class="badge badge-badge">Offline</span>';
                }
            },
            {
                field: 'Cnf',
                title: 'SOCKS5 link',
                halign: 'center',
                visible: true,
                formatter: function (value, row) {
                    var url = buildSocks5Url(row);
                    var btn = '';
                    if (url.indexOf('socks5://') === 0) {
                        btn = ' <button class="btn btn-xs btn-default" onclick="copyText(\'' + url.replace(/'/g, '&#39;') + '\')"><i class="fa fa-copy"></i></button>';
                    }
                    return '<code style="word-break: break-all;">' + url + '</code>' + btn;
                }
            },
            {
                field: 'option',
                title: 'Actions',
                halign: 'center',
                align: 'center',
                visible: {{if eq true .isAdmin}}true{{else}}false{{end}},
                formatter: function (value, row) {
                    var btn = '<div class="btn-group">';
                    btn += '<a onclick="editRemark(' + row.Id + ', \'' + (row.Remark || '').replace(/'/g, '&#39;') + '\')" class="btn btn-outline btn-success" title="Edit remark"><i class="fa fa-edit"></i></a>';
                    btn += '<a onclick="regenerate(' + row.Id + ')" class="btn btn-outline btn-primary" title="Regenerate SOCKS5 credentials"><i class="fa fa-sync-alt"></i></a>';
                    if (row.Status) {
                        btn += '<a onclick="submitform(\'stop\', \'{{.web_base_url}}/client/changestatus\', {\'id\':' + row.Id + ', \'status\': 0})" class="btn btn-outline btn-warning" title="Disable"><i class="fa fa-pause"></i></a>';
                    } else {
                        btn += '<a onclick="submitform(\'start\', \'{{.web_base_url}}/client/changestatus\', {\'id\':' + row.Id + ', \'status\': 1})" class="btn btn-outline btn-primary" title="Enable"><i class="fa fa-play"></i></a>';
                    }
                    btn += '<a onclick="submitform(\'delete\', \'{{.web_base_url}}/client/del\', {\'id\':' + row.Id + '})" class="btn btn-outline btn-danger" title="Delete"><i class="fa fa-trash"></i></a>';
                    btn += '</div>';
                    return btn;
                }
            },
            {
                field: 'cmd',
                title: 'NPC command',
                halign: 'center',
                visible: false,
                formatter: function (value, row) {
                    var cmd = './npc{{.win}} -server={{.ip}}:{{.p}} -vkey=' + row.VerifyKey + ' -type=' + '{{.bridgeType}}';
                    return '<code>' + cmd + '</code>';
                }
            }
        ]
    });

    /* The bootstrap-table English locale renames the search/columns
       buttons but our minimal layout fits everything we need. */
</script>
