<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register · NPS</title>
    <link rel="stylesheet" href="{{.web_base_url}}/static/css/app.css">
</head>
<body>
<div class="auth-shell">
    <form class="auth-card" id="register-form" onsubmit="return false;">
        <div class="brand">
            <span class="logo">N</span>
            <strong>Create account<small style="display:block">NPS panel</small></strong>
        </div>

        <div class="form-row">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required>
        </div>

        <div class="form-row">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>
        </div>

        <button type="submit" class="btn btn-primary">Create account</button>
        <p class="helper">Already have an account? <a href="{{.web_base_url}}/login/index">Sign in</a></p>
    </form>
</div>

<script>
    window.__nps_base_url = {{.web_base_url}};
</script>
<script src="{{.web_base_url}}/static/js/app.js"></script>
<script>
    document.getElementById('register-form').addEventListener('submit', function (e) {
        e.preventDefault();
        NPS.post('/login/register', {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        }).then(function (res) {
            NPS.toast((res && res.msg) || 'OK', res && res.status ? 'success' : 'error');
            if (res && res.status) {
                setTimeout(function () { window.location.href = NPS.url('/login/index'); }, 800);
            }
        });
    });
</script>
</body>
</html>
