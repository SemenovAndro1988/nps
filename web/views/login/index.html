<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in · NPS</title>
    <link rel="stylesheet" href="{{.web_base_url}}/static/css/app.css">
</head>
<body>
<div class="auth-shell">
    <form class="auth-card" id="login-form" onsubmit="return false;">
        <div class="brand">
            <span class="logo">N</span>
            <strong>NPS<small style="display:block">Bot proxy panel</small></strong>
        </div>

        <div class="form-row">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" autofocus required>
        </div>

        <div class="form-row">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary">Sign in</button>

    {{if eq true .register_allow}}
        <p class="helper">No account yet? <a href="{{.web_base_url}}/login/register">Create one</a></p>
    {{end}}
    </form>
</div>

<script>
    window.__nps_base_url = {{.web_base_url}};
</script>
<script src="{{.web_base_url}}/static/js/app.js"></script>
<script>
    document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        const data = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };
        NPS.post('/login/verify', data).then(function (res) {
            if (res && res.status) {
                window.location.href = NPS.url('/client/list');
            } else {
                NPS.toast((res && res.msg) || 'Sign in failed', 'error');
            }
        }).catch(function () {
            NPS.toast('Network error', 'error');
        });
    });
</script>
</body>
</html>
